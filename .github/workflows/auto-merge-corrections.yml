name: Auto-merge corrections

on:
  # Runs after content-check completes on a PR
  check_suite:
    types: [completed]
  # Also trigger when content-check reports status
  workflow_run:
    workflows: ['content-check']
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge bot PRs
    runs-on: ubuntu-latest
    # Only run when the triggering workflow/check succeeded
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find open correction PRs from the bot
        id: find-prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # List open PRs whose branch starts with "corrections/" or "new/"
          PRS=$(gh pr list --state open --json number,headRefName \
            --jq '[.[] | select(.headRefName | test("^(corrections|new)/"))] | .[].number' \
            | tr '\n' ' ' | xargs)

          if [ -z "$PRS" ]; then
            echo "No correction PRs found."
            echo "prs=" >> "$GITHUB_OUTPUT"
          else
            echo "Found PRs: $PRS"
            echo "prs=$PRS" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge each qualifying PR
        if: steps.find-prs.outputs.prs != ''
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MERGED_FILES=""
          for PR in ${{ steps.find-prs.outputs.prs }}; do
            echo "Attempting to merge PR #${PR}..."

            # Check all status checks passed
            STATUS=$(gh pr checks "$PR" --json state --jq '[.[].state] | if all(. == "SUCCESS"; .) then "pass" else "fail" end' 2>/dev/null || echo "fail")

            if [ "$STATUS" = "pass" ]; then
              # Extract the file path from the PR body before merging
              BODY=$(gh pr view "$PR" --json body --jq '.body' 2>/dev/null || echo "")
              FILE_PATH=$(echo "$BODY" | grep -oP '(?<=\*\*File\*\*: `)[^`]+' || echo "")

              gh pr merge "$PR" --squash --delete-branch \
                && echo "✅ PR #${PR} merged." \
                || { echo "⚠️  PR #${PR} merge failed (may need approvals or branch protection)."; continue; }

              if [ -n "$FILE_PATH" ]; then
                MERGED_FILES="${MERGED_FILES}${FILE_PATH}\n"
              fi
            else
              echo "⏳ PR #${PR} has pending or failing checks — skipping."
            fi
          done

          echo "merged_files<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$MERGED_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Trigger ISR revalidation
        if: steps.merge.outputs.merged_files != ''
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$REVALIDATION_SECRET" ]; then
            echo "⚠️  SITE_URL or REVALIDATION_SECRET not configured — skipping revalidation."
            exit 0
          fi

          # Build JSON array of paths from merged file paths
          PATHS="[]"
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            # Strip locale prefix (e.g. "en/") and .mdx extension to build the library path
            SLUG=$(echo "$file" | sed 's|^[a-z]\{2\}/||' | sed 's|\.sheet\.mdx$||' | sed 's|\.mdx$||')
            PATHS=$(echo "$PATHS" | jq --arg p "/library/$SLUG" '. + [$p]')
          done <<< "${{ steps.merge.outputs.merged_files }}"

          echo "Revalidating paths: $PATHS"

          HTTP_STATUS=$(curl -s -o /tmp/revalidate-response.json -w "%{http_code}" \
            -X POST "${SITE_URL}/api/revalidate" \
            -H "Content-Type: application/json" \
            -H "x-revalidation-secret: ${REVALIDATION_SECRET}" \
            -d "{\"paths\": $PATHS}")

          echo "Revalidation response ($HTTP_STATUS):"
          cat /tmp/revalidate-response.json
          echo ""

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ ISR revalidation triggered successfully."
          else
            echo "⚠️  ISR revalidation returned status $HTTP_STATUS (non-blocking)."
          fi
